<!DOCTYPE html>
<html>
    <head>
        <title>SuperSplat Viewer</title>
        <meta charset="utf-8" />
        <base href="__BASE_HREF__">
        <link rel="stylesheet" href="./viewer.css">
        <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
        <!-- Early connection warm-up for the CDN that hosts scene/collision files -->
        <link rel="preconnect" href="https://pub-008462eef1854bbebb57dac11df361c7.r2.dev" crossorigin>
        <link rel="dns-prefetch" href="https://pub-008462eef1854bbebb57dac11df361c7.r2.dev">
        <!-- Preload WebP WASM codec so it is in cache before the .sog parser needs it -->
        <link rel="preload" href="./static/lib/webp/webp.wasm" as="fetch" crossorigin>
    </head>
    <body>
        <div id="canvas-container">
            <canvas id="canvas"></canvas>
            <div id="poster" class="hidden">
                <img id="poster-img" alt="" />
            </div>
            <div id="loading">
                <div class="loading-spinner"></div>
                <p class="loading-text">Loading...</p>
            </div>
        </div>
        <script>
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw-viewer.js')
                    .then(() => console.log('[sw-viewer] registered'))
                    .catch(err => console.warn('[sw-viewer] registration failed:', err));
            }
        </script>
        <script type="module" src="./viewer.js"></script>
    </body>
</html>
